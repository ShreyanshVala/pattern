<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //nested for loop
      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
          if (i + j >= 6) {
            //1 j=1 1<=1 2<=1
            // document.write(i + "");
            document.write(i + "");
            //document.write(j+"")
          } else {
            document.write("&nbsp");
          }
        }
        document.write("<br>");
      }
    </script>
  </body>
</html>
