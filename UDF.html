<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //4 types of UDF /*
      //1)TNRN-take noting return nothing
      function add() {
        let a = 45;
        let b = 20;
        document.write("<br>Addition is :", a + b);
      }

      //2) TSRN - Take something Return nothing
      function area(r) {
        const pi = 3.14;
        document.write("<br>Area of Circle is " + pi * r ** 2);
      }

      //3)TNRS- take nothing return something
      function multiply() {
        let a = 25;
        let b = 5;
        return a * b;
      }

      //4)TSRS - take Something Return Something
      function cube(a) {
        return a ** 3;
      }

      add();
      area(20);
      //let res= multiply()
      //documents.write("<br>Multiplication is"+res)
      document.write("<br>Multiplication is " + multiply());
      document.write("<br>Cube is :" + cube());
    </script>
  </body>
</html>
