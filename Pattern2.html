<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //nested lopp
      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
          if (j <= i) {
            document.write(i + "");
          }
        }
        document.write("<br>");
      }

      document.write("<hr>");

      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
          if (j >= i) {
            document.write(i + "");
          }
        }
        document.write("<br>");
      }
      document.write("<hr>");

      for (let i = 1; i <= 5; i++) {
        for (let j = 1; j <= 5; j++) {
          if (j <= i) {
            document.write(j + "");
          }
        }
        document.write("<br>");
      }
    </script>
  </body>
</html>
